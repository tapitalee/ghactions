name: 'Setup Tapit CLI'
description: 'Downloads and installs the Tapit CLI'
author: 'Tapitalee'
runs:
  using: 'composite'
  steps:
    - name: Install pack
      uses: buildpacks/github-actions/setup-pack@v5.8.6
    - name: Download Tapit CLI
      shell: bash
      run: |
        curl -s --compressed -o tapit https://tapitalee.s3.us-west-2.amazonaws.com/cli/v5/linux_amd64/tapit
        chmod +x tapit
        mkdir -p $HOME/.local/bin
        mv tapit $HOME/.local/bin/
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Download Socify CLI
      shell: bash
      run: |
        curl -s --compressed -o socify https://tapitalee.s3.us-west-2.amazonaws.com/cli/v5/linux_amd64/socify
        chmod +x socify
        mv socify $HOME/.local/bin/

    - name: Status check
      shell: bash
      env:
        TAPIT_TOKEN: ${{ inputs.tapit-token }}
        TAPIT_BASEURL: ${{ inputs.tapit-baseurl }}
      run: |
        tapit status
